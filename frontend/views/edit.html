<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Distrito</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #e3f2fd;
            min-height: 100vh;
        }
        .page-load {
            animation: pageLoad 0.3s ease-out;
        }
        @keyframes pageLoad {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .container.page-load {
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
            margin-top: 20px;
            margin-bottom: 20px;
        }
        .btn-primary {
            background-color: #42a5f5;
            border-color: #42a5f5;
            box-shadow: 0 2px 5px rgba(66,165,245,0.3);
        }
        .btn-primary:hover {
            background-color: #1e88e5;
            border-color: #1e88e5;
        }
        #modalGuardando .modal-content {
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            border: none;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container">
            <span class="navbar-brand mb-0 h1">Sistema CRUD - Distritos</span>
        </div>
    </nav>

    <div class="container page-load">
        <h2 class="mb-4">Editar Distrito</h2>
        
        <div class="modal fade" id="modalGuardando" tabindex="-1" data-bs-backdrop="static">
            <div class="modal-dialog modal-dialog-centered modal-sm">
                <div class="modal-content">
                    <div class="modal-body text-center py-4">
                        <div class="spinner-border text-primary mb-2" role="status">
                            <span class="visually-hidden">Guardando...</span>
                        </div>
                        <div>Guardando...</div>
                    </div>
                </div>
            </div>
        </div>

        <form id="form">
            <input type="hidden" id="id_dis">
            
            <div class="mb-3">
                <label for="nom_dis" class="form-label">Nombre del Distrito</label>
                <input type="text" class="form-control" id="nom_dis" placeholder="Nombre" required>
            </div>
            
            <div class="mb-3">
                <label for="cod_postal" class="form-label">Código Postal</label>
                <input type="text" class="form-control" id="cod_postal" placeholder="Código Postal" required>
            </div>
            
            <div class="mb-3">
                <label for="poblacion" class="form-label">Población</label>
                <input type="number" class="form-control" id="poblacion" placeholder="Población">
            </div>
            
            <button type="submit" class="btn btn-primary">Actualizar</button>
            <button type="button" class="btn btn-secondary" id="btnCancelar">Cancelar</button>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/controllers/edit.js"></script>
</body>
</html>
